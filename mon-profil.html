<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Redirection…</title>
  <meta http-equiv="refresh" content="0; url=/dashboard" />
  <script>
    // Fichier déprécié — le profil vit désormais sur /u/<slug>.
    // On redirige au cas où quelqu'un atterrit encore sur cette URL.
    (function () {
      try {
        var raw  = localStorage.getItem('smyle_current_user');
        var user = raw ? JSON.parse(raw) : null;
        var src  = user && (user.artist_name || (user.email || '').split('@')[0]);
        if (src) {
          var slug = String(src).toLowerCase()
            .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
            .replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
          if (slug) { window.location.replace('/u/' + slug); return; }
        }
      } catch (_) {}
      window.location.replace('/dashboard');
    })();
  </script>
</head>
<body>
  <p>Cette page a déménagé — <a href="/dashboard">ouvrir le WATT BOARD</a>.</p>
</body>
</html>
