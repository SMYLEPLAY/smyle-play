services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - .:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: smyle
      POSTGRES_PASSWORD: smyle
      POSTGRES_DB: smyleplay
    ports:
      - "5433:5432"
