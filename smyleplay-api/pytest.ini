[pytest]
# Configuration pytest-asyncio 1.x — TOUS les tests et fixtures async
# partagent le MÊME event loop scoped à la session.
#
# Sans ces options, pytest-asyncio crée un event loop par test, mais
# l'engine SQLAlchemy/asyncpg de app.database est bound au loop d'import.
# Résultat : "cannot perform operation: another operation is in progress"
# dès qu'un test partage SessionLocal avec un autre.
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
