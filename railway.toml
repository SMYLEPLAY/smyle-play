[build]
builder = "nixpacks"

[deploy]
# Uvicorn ASGI — sert FastAPI (routes /watt/*, /api/auth/*, etc.)
# et monte Flask sur "/" via a2wsgi (index.html + /api/* legacy).
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2 --access-log"

# Pré-deploy : applique les migrations Alembic avant de booter le process.
preDeployCommand = "cd smyleplay-api && alembic upgrade head"

healthcheckPath = "/health"
healthcheckTimeout = 30

restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
